name: Deploy to Hosting

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22          # обновили, чтобы убрать предупреждение
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Начинаем деплой на сервер..."
            cd /var/www/rsdt_website
            
            echo "📥 Обновляем код из GitHub..."
            git fetch --all
            git reset --hard origin/main
            
            echo "📦 Устанавливаем все зависимости..."
            npm ci
            
            echo "🔨 Собираем React-приложение..."
            npm run build
            
            echo "🔄 Перезапускаем nginx..."
            systemctl restart nginx || echo "⚠️ Не удалось перезапустить nginx (проверь права)"
            
            echo "✅ Деплой успешно завершён!"